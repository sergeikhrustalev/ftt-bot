name: MAX World News Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: Run bot on Beget hosting via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: svkhrys9.beget.tech
          username: svkhrys9
          password: ${{ secrets.BEGET_SSH_PASSWORD }}
          script: |
            ACCESS_TOKEN=${{ secrets.MAX_ACCESS_TOKEN }} python3 ~/ftt-bot/max_ftt_bot.py >> ~/ftt-bot/bot.log 2>&1
            tail -3 ~/ftt-bot/bot.log
