name: MAX World News Bot

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-news:
    concurrency:
      group: ftt-max-posting
      cancel-in-progress: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MAX bot
        env:
          ACCESS_TOKEN: ${{ secrets.MAX_ACCESS_TOKEN }}
        run: python max_ftt_bot.py run

      - name: Save bot state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json queue_max.json
          git diff --staged --quiet && exit 0
          git commit -m "Update FTT MAX state"
          git pull --rebase origin main
          git push
